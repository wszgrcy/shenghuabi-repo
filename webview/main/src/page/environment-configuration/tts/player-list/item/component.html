<div mat-dialog-title>{{ type ? '修改' : '新增' }}</div>
<div mat-dialog-content class="imat-c-on-surface density-0">
  <piying-view
    class="noValid"
    [schema]="schema"
    [(model)]="modelValue"
    [options]="options"
    #formly
  >
  </piying-view>
</div>
<div mat-dialog-actions class="!tw-justify-end tw-flex">
  <button
    class="btn btn-soft btn-primary"
    (click)="apply()"
    [disabled]="loading$() || formly.form$$()?.invalid"
  >
    应用
  </button>
  <button class="btn btn-error" mat-dialog-close>取消</button>
</div>
