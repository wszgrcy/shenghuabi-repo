<mat-tab-group
  [selectedIndex]="index$()"
  class="h-full"
  [animationDuration]="0"
>
  <mat-tab label="配置环境文件夹">
    <ng-template matTabContent>
      <install-dir
        (valueChange)="dirChanged($event)"
        (next)="next(1)"
      ></install-dir>
    </ng-template>
  </mat-tab>
  <mat-tab label="知识库/对话工具" [disabled]="!defaultDirInited$()">
    <ng-template matTabContent>
      <chat-install></chat-install>
    </ng-template>
  </mat-tab>
  <mat-tab label="文字转语音" [disabled]="!defaultDirInited$()">
    <ng-template matTabContent>
      <app-python-addon></app-python-addon>
    </ng-template>
  </mat-tab>
  <mat-tab label="配置OCR" [disabled]="!defaultDirInited$()">
    <ng-template matTabContent>
      <ocr-install></ocr-install>
    </ng-template>
  </mat-tab>
</mat-tab-group>
