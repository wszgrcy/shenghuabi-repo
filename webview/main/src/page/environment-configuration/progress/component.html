@if (info(); as info) {
  <div class="flex flex-col">
    @let value = info.type === 'end' ? 100 : info.value;
    @if (!value) {
      <progress [class]="'progress' | mergeClass: colorClass$$()"></progress>
    } @else {
      <progress
        [class]="'progress' | mergeClass: colorClass$$()"
        [value]="value"
      ></progress>
    }

    <div>
      @switch (info.type) {
        @case ('error') {
          ❌
        }
        @case ('end') {
          ✔️
        }
      }
      {{ info.message }}
    </div>
  </div>
}
