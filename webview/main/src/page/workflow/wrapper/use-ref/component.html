<ng-template #templateRef let-attr="attributes" let-events="events">
  <div class="flex items-center">
    <react-outlet
      [component]="Handle"
      [root]="false"
      [props]="$any(props$$())"
      #outlet
      [addHandle]="outlet"
    >
      <div [attributes]="attr()" [events]="events()" #child class="relative">
        @if (isUsed$$()) {
          <div [class]="'badge badge-success'">
            <div class="flex-1">使用引用</div>
            <!-- todo 需要更详细提示 -->
            <button
              class="btn btn-xs btn-circle btn-ghost btn-error"
              (click)="unLink()"
            >
              <span class="material-icons">close</span>
            </button>
          </div>
        } @else {
          <div class="badge badge-warning">等待连接</div>
        }
      </div>
    </react-outlet>
  </div>
</ng-template>
