@let schema = schema$$();
@if (schema) {
  @if (errorList$$().length) {
    <div role="alert" class="alert alert-warning mb-2">
      <span>{{ errorList$$() }}</span>
    </div>
  }
  <piying-view
    class="noValid grid gap-2 nowheel nodrag"
    [schema]="schema"
    [options]="options"
    [model]="model$$()"
  ></piying-view>
} @else if ($any(model$$())) {
  <div class="flex gap-2 flex-col" [valueFormat]="$any(model$$())"></div>
}
