<div class="flex gap-2 flex-col">
  @for (item of inputList(); track $index) {
    @let label = item.label;
    @switch (inputType | pure: item) {
      @case ('string') {
        <textarea
          class="textarea w-full"
          cdkTextareaAutosize
          [ngModel]="inputValue | pure: value$() : item.key"
          (ngModelChange)="valueChange2(item.key, $event)"
          skipEnter
          (keypressEnter)="keypressEnter()"
          [placeholder]="label"
        ></textarea>
      }
      @case ('image') {
        <div class="flex items-center gap-2 w-full">
          <label>{{ label }}</label>
          <image-base64-input
            [ngModel]="inputValue | pure: value$() : item.key"
            (ngModelChange)="valueChange2(item.key, $event)"
          ></image-base64-input>
        </div>
      }
    }
  }
</div>
