<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content class="custom-scrollbar !pt-2">
  <piying-view
    [(model)]="model"
    [schema]="schema"
    [options]="options"
    class="form-minimum noValid"
  >
  </piying-view>
</mat-dialog-content>
<mat-dialog-actions>
  <div class="flex-1"></div>
  <button class="btn btn-error" [mat-dialog-close] cdkFocusInitial>
    取消
  </button>
  <button class="btn btn-soft btn-primary" (click)="apply()">确定</button>
</mat-dialog-actions>
