<button
  class="btn btn-soft btn-primary btn-xs"
  (click)="hint()"
  [disabled]="this.loading$()"
  [matTooltip]="'已配置'"
  [matTooltipDisabled]="!needCheck$() || !checkStatus$()"
>
  @if (needCheck$()) {
    @if (checkStatus$()) {
      <span class="material-icons icon-4"> check </span>
    } @else {
      <span class="material-icons icon-4"> help </span>
    }
  }
  <ng-content></ng-content>
</button>
