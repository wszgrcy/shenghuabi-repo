<svg viewBox="0 0 100 100" #svg (mousedown)="mousedownChange($event)">
  <line
    x1="50"
    y1="0"
    x2="50"
    y2="100"
    stroke-width="2"
    stroke-dasharray="2,1"
    stroke="currentColor"
  ></line>
  <line
    x1="0"
    y1="50"
    x2="100"
    y2="50"
    stroke-width="2"
    stroke-dasharray="2,1"
    stroke="currentColor"
  ></line>
  <line
    x1="50"
    y1="50"
    [attr.x2]="offsetPosition$().x"
    [attr.y2]="offsetPosition$().y"
    stroke-width="2"
    stroke="currentColor"
  ></line>
  <circle
    [attr.cx]="offsetPosition$().x"
    [attr.cy]="offsetPosition$().y"
    r="5"
    fill="currentColor"
    class="cursor-pointer c-point"
  ></circle>
</svg>
